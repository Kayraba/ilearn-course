# Render blueprint - one-click deploy of iLearn (web service + managed Postgres).
services:
  - type: web
    name: ilearn
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ilearn-db
          property: connectionString

databases:
  - name: ilearn-db
    plan: basic-256mb
    postgresMajorVersion: "16"
