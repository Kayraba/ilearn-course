<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lexend:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
@keyframes azblink{0%,50%{opacity:1}51%,100%{opacity:0}}
@keyframes azrip{0%{transform:scale(.4);opacity:.55}100%{transform:scale(2.4);opacity:0}}
@keyframes azpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes azpop{0%{transform:scale(.92);opacity:0}100%{transform:scale(1);opacity:1}}
*{box-sizing:border-box}
html,body{margin:0}
button:focus-visible,[tabindex]:focus-visible{outline:3px solid #1b8f8a;outline-offset:3px}
.az-rail::-webkit-scrollbar{height:8px}
.az-rail::-webkit-scrollbar-thumb{background:#cfd7e0;border-radius:8px}
@media (prefers-reduced-motion: reduce){*{animation-duration:.001ms!important;transition-duration:.001ms!important}}
@media (max-width:900px){.az-body{flex-direction:column!important}.az-side{width:auto!important;border-right:none!important;border-bottom:1px solid #eef0f3!important;flex-direction:row!important;overflow-x:auto!important}.az-side-step{min-width:190px!important}}
</style>
</helmet>
<div style="min-height:100vh;background:radial-gradient(130% 120% at 50% 0,#f7f5f0,#e9ebe6);display:flex;align-items:flex-start;justify-content:center;padding:26px;font-family:Inter,system-ui,sans-serif">
 <div ref="{{ frameRef }}" tabindex="-1" style="width:100%;max-width:1180px;background:#fff;border-radius:26px;box-shadow:0 44px 120px rgba(12,39,77,.18);overflow:hidden">

  <div style="display:flex;align-items:center;justify-content:space-between;gap:16px;padding:18px 26px;border-bottom:1px solid #eef0f3;flex-wrap:wrap">
    <div style="display:flex;align-items:center;gap:14px">
      <div style="position:relative;width:48px;height:48px;border-radius:14px;background:linear-gradient(150deg,#12395f,#0c2742);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 20px rgba(12,39,77,.32)">
        <span style="font:700 27px Lexend,sans-serif;color:#fff;line-height:1">i</span>
        <span style="position:absolute;right:-4px;top:-4px;width:15px;height:15px;border-radius:5px;background:#1b8f8a;box-shadow:0 2px 6px rgba(27,143,138,.55)"></span>
      </div>
      <div>
        <div style="font:700 20px Lexend,sans-serif;color:#12395f;line-height:1.05">iLearn</div>
        <div ref="{{ orgRef }}" style="font:500 12px Inter,sans-serif;color:#6b7785;letter-spacing:1.4px;text-transform:uppercase;margin-top:2px">Confident Computing</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <div ref="{{ learnerRef }}" style="font:600 13px Inter,sans-serif;color:#4a5765;background:#f2f4f7;border-radius:999px;padding:8px 15px">Learner: David</div>
      <div style="display:flex;align-items:center;gap:9px;font:600 14px Inter,sans-serif;color:#12395f;background:#eef4f3;border:1px solid #d8e8e5;border-radius:999px;padding:8px 15px">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#1b8f8a" stroke-width="2.4" stroke-linecap="round"><circle cx="12" cy="12" r="9"></circle><path d="M12 7v5l3 2"></path></svg>
        <span ref="{{ clockRef }}">00:00</span><span style="color:#93a1ad;font-weight:500"> / 60:00</span>
      </div>
      <div ref="{{ numRef }}" style="font:600 13px Inter,sans-serif;color:#12395f;background:#fff;border:1px solid #e2e7ee;border-radius:999px;padding:8px 15px">Lesson 1 of 16</div>
    </div>
  </div>

  <div class="az-body" style="display:flex;align-items:stretch">
    <div class="az-side" style="flex:0 0 236px;width:236px;border-right:1px solid #eef0f3;background:#fbfbfa;padding:14px 12px;display:flex;flex-direction:column;gap:6px">
      <div style="font:600 11px Inter,sans-serif;color:#93a1ad;letter-spacing:1.4px;text-transform:uppercase;padding:6px 10px 4px">60-minute session</div>
      <sc-for list="{{ phases }}" as="ph" hint-placeholder-count="6">
        <button type="button" class="az-side-step" data-ph="{{ ph.i }}" onClick="{{ onPhase }}" style="display:flex;align-items:flex-start;gap:11px;text-align:left;border:none;background:transparent;border-radius:12px;padding:11px 11px;cursor:pointer;min-height:52px">
          <span style="flex:0 0 auto;width:26px;height:26px;border-radius:50%;background:#e7ebf0;color:#52606e;font:700 12px Inter,sans-serif;display:flex;align-items:center;justify-content:center;margin-top:1px">{{ ph.i1 }}</span>
          <span>
            <span style="display:block;font:600 14px/1.2 Inter,sans-serif;color:#2a3b4d">{{ ph.title }}</span>
            <span style="display:block;font:500 12px Inter,sans-serif;color:#8a97a4;margin-top:2px">{{ ph.mins }}</span>
          </span>
        </button>
      </sc-for>
    </div>

    <div style="flex:1;min-width:0;display:flex;flex-direction:column">
      <div ref="{{ paneRef }}"></div>
    </div>
  </div>

  <div class="az-rail" ref="{{ railRef }}" aria-label="Choose a lesson" style="display:flex;gap:9px;overflow-x:auto;padding:14px 22px 18px;background:#f4f5f3;border-top:1px solid #eef0f3">
    <sc-for list="{{ lessons }}" as="lesson" hint-placeholder-count="8">
      <button type="button" data-idx="{{ lesson.idx }}" onClick="{{ onSelect }}" style="flex:0 0 auto;display:flex;flex-direction:column;gap:2px;text-align:left;min-width:150px;padding:9px 13px;border:1.5px solid #e6e9ee;border-radius:12px;background:#fff;cursor:pointer;min-height:46px">
        <span style="font:600 11px Inter,sans-serif;color:#1b8f8a;letter-spacing:.4px">LESSON {{ lesson.n }}</span>
        <span style="font:600 13px/1.2 Inter,sans-serif;color:#2a3b4d">{{ lesson.title }}</span>
      </button>
    </sc-for>
  </div>
 </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1180,&quot;height&quot;:860},&quot;startLesson&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:1,&quot;min&quot;:1,&quot;max&quot;:16,&quot;unit&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Session&quot;},&quot;orgName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Confident Computing&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Branding&quot;},&quot;learnerName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;David&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Session&quot;}}">
class Component extends DCLogic {
  constructor(props) {
    super(props);
    this.tTimers = [];
    this.raf = 0;
    this.idx = 0;
    this.phase = 0;
    this.clock = 0;
    this.curFrame = -1;
    this.started = false;
    this.playing = false;
    this.ended = false;
    this.voiceOn = false;
    this.ccOn = true;
    this.sessionStart = null;
    this.sessionElapsed = 0;
    this.sessionTick = 0;
    this.cardDone = {};
    this.prompt = null;
    this.loop = this.loop.bind(this);

    this.phases = [
      { i: 0, i1: '1', title: 'Welcome', mins: '0–5 min' },
      { i: 1, i1: '2', title: 'Watch the demo', mins: '5–12 min' },
      { i: 2, i1: '3', title: 'Guided practice', mins: '12–45 min' },
      { i: 3, i1: '4', title: 'On your own', mins: '45–55 min' },
      { i: 4, i1: '5', title: 'Record & celebrate', mins: '55–60 min' },
    ];

    /* ---------- scene builders (inline-styled) ---------- */
    const cur = '<span style="display:inline-block;width:3px;height:1.05em;background:#1f2d3a;margin-left:2px;vertical-align:-3px;animation:azblink 1.05s steps(1) infinite"></span>';
    const tb = (bg, name) => `<div class="az-tb" style="display:flex;align-items:center;justify-content:space-between;background:${bg};color:#fff;font:600 15px/1 Inter,sans-serif;padding:11px 16px">${name}<span class="x" style="letter-spacing:4px;opacity:.92;font-size:14px">&#8211;&nbsp;&#9633;&nbsp;&#10005;</span></div>`;
    const fbtn = (l, k, hot, extra) => `<div data-k="${k}" style="width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font:700 17px Georgia,serif;background:${hot ? '#cfe6ff' : '#fff'};border:1.5px solid ${hot ? '#3f8efc' : '#dce3ec'};color:#2a3b4d;${extra || ''}">${l}</div>`;
    const fbtns = (hot) => { hot = hot || ''; return fbtn('B', 'B', hot.includes('B')) + fbtn('I', 'I', hot.includes('I'), 'font-style:italic') + fbtn('U', 'U', hot.includes('U'), 'text-decoration:underline') + fbtn('A', 'C', hot.includes('C'), 'color:#c0392b'); };
    const word = (ribbon, page) => `<div style="width:76%;max-width:560px;background:#fff;border-radius:14px;box-shadow:0 30px 70px rgba(8,30,55,.4);overflow:hidden">${tb('#185abd', 'Document — Word')}<div style="display:flex;gap:9px;padding:9px 16px;background:#f2f5f9;border-bottom:1px solid #e2e8f1">${ribbon}</div><div style="background:#e9edf3;padding:20px;display:flex;justify-content:center"><div style="width:88%;min-height:140px;background:#fff;box-shadow:0 3px 14px rgba(0,0,0,.08);padding:24px;font:400 22px/1.5 Georgia,serif;color:#1f2d3a">${page}</div></div></div>`;
    const excel = (cells, sel, cls) => {
      cls = cls || {}; const cols = ['A', 'B', 'C'];
      let head = '<div style="background:#eef2f7;border:1px solid #dbe3ec"></div>' + cols.map((c) => `<div style="background:#eef2f7;border:1px solid #dbe3ec;display:flex;align-items:center;justify-content:center;font:600 14px Inter,sans-serif;color:#5b6b7d;padding:7px 0">${c}</div>`).join('');
      let body = '';
      for (let r = 1; r <= 5; r++) {
        body += `<div style="background:#eef2f7;border:1px solid #dbe3ec;display:flex;align-items:center;justify-content:center;font:600 14px Inter,sans-serif;color:#5b6b7d">${r}</div>` + cols.map((c) => {
          const k = c + r, v = cells[k] || '', sl = sel === k, ex = cls[k] || '';
          const bold = r === 1 ? 'font-weight:700;' : '';
          const bg = sl ? '#e6f4f1' : ex === 'tot' ? '#fff7e6' : ex === 'sum' ? '#eaf6ff' : '#fff';
          const bd = sl ? '2px solid #1b8f8a' : '1px solid #e3e9f1';
          return `<div data-cell="${k}" style="border:${bd};background:${bg};${bold}display:flex;align-items:center;padding:7px 10px;font:400 15px Inter,sans-serif;color:#23303d;min-height:32px">${v}</div>`;
        }).join('');
      }
      return `<div style="width:76%;max-width:560px;background:#fff;border-radius:14px;box-shadow:0 30px 70px rgba(8,30,55,.4);overflow:hidden">${tb('#107c41', 'Book1 — Excel')}<div style="display:flex;align-items:center;gap:12px;padding:8px 16px;background:#f4f7fa;border-bottom:1px solid #e2e8f1"><div style="min-width:50px;text-align:center;font:600 14px Inter,sans-serif;color:#5b6b7d;background:#fff;border:1px solid #dbe3ec;border-radius:6px;padding:6px 8px">${sel || 'A1'}</div><div data-fx style="flex:1;font:400 15px Inter,sans-serif;color:#23303d">${cells[sel] || ''}</div></div><div style="display:grid;grid-template-columns:42px repeat(3,1fr);padding:13px;background:#fbfcfe">${head}${body}</div></div>`;
    };
    const deskIc = (bg, glyph, lab, key, sel) => `<div data-ic="${key}" style="width:92px;text-align:center;${sel === key ? 'background:rgba(255,255,255,.18);border-radius:10px;' : ''}padding:8px 4px"><div style="width:56px;height:56px;margin:0 auto;border-radius:12px;background:${bg};display:flex;align-items:center;justify-content:center;font:700 25px Inter,sans-serif;color:#fff;box-shadow:0 6px 16px rgba(0,0,0,.25)">${glyph}</div><div style="margin-top:7px;font:500 13px Inter,sans-serif;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.5)">${lab}</div></div>`;
    const desk = (sel) => `<div style="width:88%;height:78%;border-radius:16px;background:linear-gradient(150deg,#1d5e7e,#2f8f7e);box-shadow:inset 0 0 0 1px rgba(255,255,255,.08),0 30px 70px rgba(8,30,55,.4);display:flex;gap:22px;align-items:flex-start;padding:28px">${deskIc('#5b6b7b', '&#128465;', 'Recycle', 'bin', sel)}${deskIc('#185abd', 'W', 'Word', 'w', sel)}${deskIc('#107c41', 'X', 'Excel', 'x', sel)}${deskIc('#e8a13a', '&#128193;', 'Documents', 'docs', sel)}</div>`;
    const key = (t, flex, hot) => `<div style="flex:${flex || '0 0 auto'};min-width:38px;height:42px;display:flex;align-items:center;justify-content:center;background:${hot && hot.includes(t) ? '#1b8f8a' : '#fff'};color:${hot && hot.includes(t) ? '#fff' : '#28323d'};border-radius:8px;border:1.5px solid #dce3ec;font:600 14px Inter,sans-serif;box-shadow:0 2px 0 #d3dae3">${t}</div>`;
    const krow = (inner) => `<div style="display:flex;gap:6px;justify-content:center;margin-bottom:6px">${inner}</div>`;
    const keys = (hot) => `<div style="background:#eef2f6;border-radius:16px;padding:16px;box-shadow:0 30px 70px rgba(8,30,55,.4)">${krow(['Q', 'W', 'E', 'R', 'T', 'Y', 'U', 'I', 'O', 'P'].map((x) => key(x, 0, hot)).join('') + key('&#9003;', '1 1 0', hot))}${krow(['A', 'S', 'D', 'F', 'G', 'H', 'J', 'K', 'L'].map((x) => key(x, 0, hot)).join('') + key('&#9166; Enter', '1 1 0', hot))}${krow(key('&#8679; Shift', '1 1 0', hot) + ['Z', 'X', 'C', 'V', 'B', 'N', 'M'].map((x) => key(x, 0, hot)).join(''))}${krow(key('space', '1 1 0', hot))}</div>`;
    const combo = (a, b, label) => `<div style="background:#fff;border-radius:18px;box-shadow:0 30px 70px rgba(8,30,55,.4);padding:32px 42px;text-align:center"><div style="display:flex;gap:15px;align-items:center;justify-content:center"><div style="min-width:92px;height:60px;display:flex;align-items:center;justify-content:center;background:#12395f;color:#fff;border-radius:12px;font:700 19px Inter,sans-serif">${a}</div><div style="font:300 36px Inter,sans-serif;color:#1b8f8a">+</div><div style="min-width:60px;height:60px;display:flex;align-items:center;justify-content:center;background:#12395f;color:#fff;border-radius:12px;font:700 24px Inter,sans-serif">${b}</div></div><div style="margin-top:16px;font:600 23px Lexend,Inter,sans-serif;color:#12395f">${label}</div></div>`;
    const con = (icon, title, pill) => `<div style="background:#fff;border-radius:18px;box-shadow:0 30px 70px rgba(8,30,55,.4);padding:34px 42px;max-width:440px;text-align:center"><div style="font-size:52px;line-height:1">${icon}</div><div style="margin-top:12px;font:600 24px/1.3 Lexend,Inter,sans-serif;color:#12395f">${title}</div>${pill ? `<div style="display:inline-block;margin-top:13px;background:#e6f4f1;color:#15706b;border-radius:999px;padding:8px 18px;font:600 14px Inter,sans-serif">${pill}</div>` : ''}</div>`;
    const folder = () => `<div style="width:72%;max-width:520px;background:#fff;border-radius:14px;box-shadow:0 30px 70px rgba(8,30,55,.4);overflow:hidden">${tb('#5b6b7b', '&#128193; Documents')}<div style="background:#fbfcfd;padding:28px;min-height:150px"><div data-ic="file" style="width:120px;text-align:center"><div style="font-size:54px;color:#185abd">&#128462;</div><div style="margin-top:6px;font:500 14px Inter,sans-serif;color:#2a3b4d">my first note</div></div></div></div>`;
    const save = (name) => `<div style="width:74%;max-width:540px;background:#fff;border-radius:14px;box-shadow:0 30px 70px rgba(8,30,55,.4);overflow:hidden">${tb('#185abd', 'Save As')}<div style="background:#eceef1;padding:28px;display:flex;justify-content:center"><div style="background:#fff;border-radius:12px;box-shadow:0 14px 34px rgba(0,0,0,.18);padding:22px;width:90%"><div style="margin-bottom:15px;color:#52606e;font:500 15px Inter,sans-serif">&#128193; Documents</div><div style="display:flex;gap:11px;align-items:center"><span style="color:#3c4854;font:500 15px Inter,sans-serif">File name:</span><div data-fx style="flex:1;border:2px solid #185abd;border-radius:7px;padding:9px 12px;min-height:22px;font:400 16px Inter,sans-serif;color:#1f2d3a">${name || ''}</div></div><div style="text-align:right;margin-top:16px"><span data-k="save" style="display:inline-block;background:#185abd;color:#fff;padding:9px 24px;border-radius:8px;font:600 15px Inter,sans-serif">Save</span></div></div></div></div>`;
    const signin = () => `<div style="width:78%;max-width:500px;border-radius:18px;background:linear-gradient(160deg,#123a63,#2f8f7e);box-shadow:0 30px 70px rgba(8,30,55,.4);padding:40px;text-align:center;color:#fff"><div style="width:88px;height:88px;border-radius:50%;background:rgba(255,255,255,.85);margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:44px">&#128100;</div><div style="margin-top:14px;font:600 22px Lexend,Inter,sans-serif">David</div><div data-fx style="margin:16px auto 0;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.5);border-radius:8px;padding:11px 0;max-width:230px;letter-spacing:6px;font-size:20px;min-height:22px"></div></div>`;
    const titleCard = (n, t) => `<div style="text-align:center;color:#fff"><div style="font:600 15px Inter,sans-serif;letter-spacing:3px;text-transform:uppercase;color:#7fd6cf">Lesson ${n}</div><div style="margin-top:11px;font:600 36px/1.2 Lexend,Inter,sans-serif;max-width:600px">${t}</div><div style="display:inline-block;margin-top:16px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.28);border-radius:999px;padding:8px 18px;font:500 14px Inter,sans-serif">Watch, then try it yourself</div></div>`;
    const doneCard = (msg) => `<div style="text-align:center;color:#fff"><div style="width:88px;height:88px;border-radius:50%;background:#1b8f8a;margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:46px;box-shadow:0 12px 30px rgba(27,143,138,.5)">&#10003;</div><div style="margin-top:16px;font:600 30px/1.25 Lexend,Inter,sans-serif;max-width:520px">${msg}</div></div>`;

    /* ---------- lesson catalogue ---------- */
    this.lessons = [
      { idx: 0, n: '01', title: 'Turn on & sign in', full: 'Turn on and sign in',
        goal: 'Switch the computer on, sign in safely, and recognise the desktop.',
        outcome: 'I can turn the computer on, wait calmly, sign in, and know I have reached the desktop.',
        tutor: 'Today we learn the full start-up routine. We turn the computer on, wait calmly, sign in carefully, and check the desktop is ready. We are not rushing — waiting is part of using a computer well.',
        note: 'Let the learner set the pace. Waiting for the machine to load is a skill in itself. Praise calm waiting, not speed.',
        cards: ['Prepare the real computer and check the sign-in details are ready.', 'Turn it on, wait, sign in, and point to the desktop.', 'Choose the calm, correct thing to do while it loads.', 'Repeat the sign-in with fewer prompts.', 'Type one thing you can see on the desktop.', 'Stretch: find the safe "Shut down" option.'] },
      { idx: 1, n: '02', title: 'The mouse & clicking', full: 'The mouse: moving and clicking',
        goal: 'Move the pointer, click once, and choose an item on screen.',
        outcome: 'I can move the pointer where I want and click once to choose something.',
        tutor: 'The mouse moves the pointer. The pointer is how we reach things on the screen. Today we move slowly, stop on the target, and click once to choose.',
        note: 'Check mouse position and grip first. If pointer control is hard, note whether it is speed, aim, or confidence.',
        cards: ['Move the pointer to all four corners of the screen.', 'Click five targets as they are named for you.', 'Show that one click means "choose".', 'Open the Start menu or a pinned app.', 'Type the word "click".', 'Complete three target clicks with fewer prompts.'] },
      { idx: 2, n: '03', title: 'Double-click', full: 'Clicking and double-clicking',
        goal: 'Open a folder or app with two quick clicks.',
        outcome: 'I can open a folder or program with a double-click, and stay calm if I need to try again.',
        tutor: 'A double-click opens things. The trick is two quick clicks while the mouse stays still. If it does not open the first time, that is okay — we calmly try again.',
        note: 'If double-click is tricky, note whether it is the timing, the mouse moving, or confidence. All three are common and fixable.',
        cards: ['Practise the click-click rhythm away from any icon.', 'Open the Documents folder a few times.', 'Show what matters most: keeping the mouse still.', 'Open Word, then close it.', 'Type "double-click".', 'Open one folder and one app on your own where you can.'] },
      { idx: 3, n: '04', title: 'The keyboard', full: 'The keyboard',
        goal: 'Type letters, make spaces, start new lines, and fix mistakes.',
        outcome: 'I can type words, use Space between them, start a new line, and fix a mistake with Backspace.',
        tutor: 'Today the keyboard becomes a tool for messages. We type slowly, use Space between words, Enter for a new line, and Backspace to fix mistakes.',
        note: 'Check whether larger on-screen text is needed. Focus on Space, Enter and Backspace — capitals can wait for the stretch task.',
        cards: ['Find five letters on the keyboard.', 'Type three short words.', 'Show which key is Backspace.', 'Make two lines using Enter.', 'Type a short message.', 'Stretch: make one capital letter with Shift.'] },
      { idx: 4, n: '05', title: 'Open & close', full: 'Open and close a program',
        goal: 'Open a program, control the window, and close it safely.',
        outcome: 'I can open a program, minimise and restore its window, and close it with the X.',
        tutor: 'A program opens inside a window. The buttons at the top help us manage the window. The X means we are finished with it.',
        note: 'If several open windows are confusing, work with one window at a time and note that in the record.',
        cards: ['Name the three window buttons.', 'Open, minimise, restore, and close a program.', 'Show that X means "close".', 'Tidy a screen that has several windows open.', 'Type "close".', 'Do the full window routine on your own where you can.'] },
      { idx: 5, n: '06', title: 'Save & find', full: 'Save a file and find it again',
        goal: 'Save work with a clear name in Documents.',
        outcome: 'I can save my work in Documents with a clear name and find it again.',
        tutor: 'Saving means keeping our work. A good file name helps us find it later. Today we make a real note, save it in Documents, close it, and find it again.',
        note: 'Encourage a meaningful file name. Check the learner can explain where the file went, not just click the buttons.',

  componentDidMount() {
    this.rm = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const start = Math.min(16, Math.max(1, this.props.startLesson || 1)) - 1;
    if (this.orgEl && this.props.orgName) this.orgEl.textContent = this.props.orgName;
    if (this.learnerEl) this.learnerEl.textContent = 'Learner: ' + (this.props.learnerName || 'David');
    this.setupLesson(start, true);
    this.sessionTick = setInterval(() => this.tickSession(), 1000);
  }
  componentWillUnmount() { this.stopAll(); clearInterval(this.sessionTick); }

  /* ===== session clock ===== */
  tickSession() {
    if (!this.sessionStart) return;
    const el = this.sessionElapsed + (performance.now() - this.sessionStart);
    if (this.clockEl) this.clockEl.textContent = this.mmss(el);
  }
  startSessionClock() { if (!this.sessionStart) this.sessionStart = performance.now(); }
  mmss(ms) { const s = Math.floor(ms / 1000); return String(Math.floor(s / 60)).padStart(2, '0') + ':' + String(s % 60).padStart(2, '0'); }
  fmt(ms) { const s = Math.round(ms / 1000); return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0'); }

  stopAll() { cancelAnimationFrame(this.raf); clearInterval(this.tickInt); this.tickInt = 0; this.cancelVoice(); this.clearType(); this.playing = false; }
  clearType() { this.tTimers.forEach(clearTimeout); this.tTimers = []; }
  cancelVoice() { if (window.speechSynthesis) window.speechSynthesis.cancel(); }

  setupLesson(i, keepSession) {
    this.stopAll();
    this.idx = i; this.frames = this.L[i]; this.les = this.lessons[i];
    this.total = this.frames.reduce((a, f) => a + (f.dur || 2400), 0);
    this.clock = 0; this.curFrame = -1; this.started = false; this.playing = false; this.ended = false;
    this.cardDone = {}; this.prompt = null;
    if (!keepSession) { this.sessionStart = null; this.sessionElapsed = 0; if (this.clockEl) this.clockEl.textContent = '00:00'; }
    if (this.numEl) this.numEl.textContent = 'Lesson ' + (i + 1) + ' of 16';
    this.phase = 0;
    this.paintRail(); this.renderPhase();
  }

  goPhase(p) {
    if (p === 1) { this.startSessionClock(); }
    this.stopAll();
    this.phase = p; this.renderPhase();
  }

  paintPhaseNav() {
    if (!this.sideEl) this.sideEl = this.frameEl && this.frameEl.querySelector('.az-side');
    const btns = this.frameEl ? this.frameEl.querySelectorAll('[data-ph]') : [];
    btns.forEach((b) => {
      const on = +b.dataset.ph === this.phase;
      b.style.background = on ? '#12395f' : 'transparent';
      const dot = b.querySelector('span'); const label = b.querySelectorAll('span span');
      if (dot) { dot.style.background = on ? '#1b8f8a' : '#e7ebf0'; dot.style.color = on ? '#fff' : '#52606e'; }
      if (label[0]) label[0].style.color = on ? '#fff' : '#2a3b4d';
      if (label[1]) label[1].style.color = on ? '#bcd3e8' : '#8a97a4';
    });
  }
  paintRail() {
    if (!this.rail) return;
    this.rail.querySelectorAll('[data-idx]').forEach((btn) => {
      const on = +btn.dataset.idx === this.idx;
      btn.style.background = on ? '#12395f' : '#fff';
      btn.style.borderColor = on ? '#12395f' : '#e6e9ee';
      const sp = btn.querySelectorAll('span');
      if (sp[0]) sp[0].style.color = on ? '#7fd6cf' : '#1b8f8a';
      if (sp[1]) sp[1].style.color = on ? '#fff' : '#2a3b4d';
    });
  }

  /* ===== phase panes ===== */
  renderPhase() {
    if (!this.pane) return;
    this.stopAll();
    this.paintPhaseNav();
    const p = this.phase;
    if (p === 0) this.renderWelcome();
    else if (p === 1) this.renderWatch();
    else if (p === 2) this.renderGuided();
    else if (p === 3) this.renderIndependent();
    else this.renderRecord();
  }

  btn(label, primary, onClick, extra) {
    const b = document.createElement('button');
    b.type = 'button';
    b.textContent = label;
    b.style.cssText = 'display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:999px;padding:14px 26px;font:600 16px Inter,sans-serif;cursor:pointer;min-height:52px;' + (primary ? 'background:#1b8f8a;color:#fff;box-shadow:0 10px 26px rgba(27,143,138,.32);' : 'background:#eef1f4;color:#12395f;') + (extra || '');
    b.addEventListener('click', onClick);
    return b;
  }

  /* ===== video engine ===== */
  applyToggleStyles() { this.paintPlayIcon(); }
  paintPlayIcon() {
    if (!this.iconEl) return;
    this.iconEl.innerHTML = this.playing
      ? '<svg viewBox="0 0 24 24" width="21" height="21" fill="currentColor"><path d="M6 5h4v14H6zM14 5h4v14h-4z"></path></svg>'
      : '<svg viewBox="0 0 24 24" width="21" height="21" fill="currentColor"><path d="M8 5v14l11-7z"></path></svg>';
  }
  showPoster(b) { if (this.posterEl) this.posterEl.style.display = b ? 'flex' : 'none'; }
  showEnded(b) { if (this.endedEl) this.endedEl.style.display = b ? 'flex' : 'none'; }

  play() {
    if (this.phase !== 1) return;
    if (this.ended) { this.replay(); return; }
    this.started = true; this.showPoster(false); this.showEnded(false);
    this.playing = true; this.paintPlayIcon();
    if (this.curFrame < 0) this.syncFrame();
    this.startTicker();
  }
  startTicker() {
    this.lastTs = performance.now();
    cancelAnimationFrame(this.raf); clearInterval(this.tickInt);
    this.raf = requestAnimationFrame(this.loop);
    this.tickInt = setInterval(this.loop, 33);
  }
  stopTicker() { cancelAnimationFrame(this.raf); clearInterval(this.tickInt); this.tickInt = 0; }
  togglePlay() {
    if (!this.started || this.ended) { this.ended ? this.replay() : this.play(); return; }
    this.playing ? this.pause() : this.resume();
  }
  pause() { this.playing = false; this.stopTicker(); this.cancelVoice(); this.paintPlayIcon(); }
  resume() { this.playing = true; this.paintPlayIcon(); this.startTicker(); }
  replay() {
    if (this.phase !== 1) return;
    this.clock = 0; this.curFrame = -1; this.ended = false; this.started = true;
    this.showEnded(false); this.showPoster(false); this.playing = true; this.paintPlayIcon();
    this.syncFrame(); this.startTicker();
  }
  loop() {
    if (!this.playing) return;
    const now = performance.now();
    const dt = Math.min(now - this.lastTs, 200); this.lastTs = now;
    this.clock += dt;
    if (this.clock >= this.total) { this.clock = this.total; this.paintProgress(); this.syncFrame(); this.end(); return; }
    this.paintProgress(); this.syncFrame();
  }
  end() { this.playing = false; this.stopTicker(); this.cancelVoice(); this.ended = true; this.paintPlayIcon(); this.showEnded(true); }

  syncFrame() {
    if (!this.frames) return;
    let acc = 0, idx = 0;
    for (let i = 0; i < this.frames.length; i++) { acc += this.frames[i].dur || 2400; idx = i; if (this.clock < acc) break; }
    if (idx !== this.curFrame) { this.curFrame = idx; this.showFrame(this.frames[idx]); }
  }
  paintProgress() {
    const pct = this.total ? this.clock / this.total * 100 : 0;
    if (this.progEl) this.progEl.style.width = pct + '%';
    if (this.timeEl) this.timeEl.textContent = this.fmt(this.clock);
    if (this.trackEl) this.trackEl.setAttribute('aria-valuenow', Math.round(pct));
  }
  showFrame(f) {
    if (!this.stage) return;
    const scene = document.createElement('div');
    scene.className = 'az-scene';
    scene.style.cssText = 'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .45s ease;padding:22px';
    scene.innerHTML = f.html;
    this.stage.appendChild(scene);
    requestAnimationFrame(() => { scene.style.opacity = '1'; });
    const olds = [...this.stage.querySelectorAll('.az-scene')].slice(0, -1);
    setTimeout(() => olds.forEach((o) => o.remove()), 480);
    if (this.capEl) this.capEl.textContent = f.cap || '';
    this.speak(f.cap);
    this.clearType();
    if (f.focus) setTimeout(() => this.moveCursor(f.focus, scene), this.rm ? 0 : 260);
    else if (this.cursorEl) this.cursorEl.style.opacity = '0';
    if (f.type) setTimeout(() => this.typeInto(f.type.sel, f.type.txt, scene), this.rm ? 0 : 260);
  }
  moveCursor(sel, scene) {
    const el = scene.querySelector(sel); if (!el || !this.cursorEl || !this.stage) return;
    const s = this.stage.getBoundingClientRect(), g = el.getBoundingClientRect();
    const x = g.left - s.left + g.width / 2, y = g.top - s.top + g.height / 2;
    this.cursorEl.style.opacity = '1';
    this.cursorEl.style.left = x + 'px'; this.cursorEl.style.top = y + 'px';
    setTimeout(() => {
      if (!this.ripEl) return;
      this.ripEl.style.left = (x - 16) + 'px'; this.ripEl.style.top = (y - 16) + 'px';
      this.ripEl.style.animation = 'none'; void this.ripEl.offsetWidth; this.ripEl.style.animation = 'azrip .7s ease-out';
    }, this.rm ? 0 : 760);
  }
  typeInto(sel, txt, scene) {
    const el = scene.querySelector(sel); if (!el) return;
    if (this.rm) { el.textContent = txt; return; }
    let i = 0; el.textContent = '';
    const step = () => { if (i <= txt.length) { el.textContent = txt.slice(0, i); i++; this.tTimers.push(setTimeout(step, 78)); } };
    step();
  }
  speak(text) {
    if (!this.voiceOn || !text || !window.speechSynthesis) return;
    const synth = window.speechSynthesis; synth.cancel();
    const u = new SpeechSynthesisUtterance(String(text).replace(/<[^>]+>/g, ''));
    u.rate = 0.92; u.pitch = 1; u.lang = 'en-GB';
    const v = synth.getVoices().find((x) => /en-GB/i.test(x.lang));
    if (v) u.voice = v;
    synth.speak(u);
  }
  scrub(e) {
    if (!this.total || !this.trackEl) return;
    const r = this.trackEl.getBoundingClientRect();
    let p = (e.clientX - r.left) / r.width; p = Math.max(0, Math.min(1, p));
    this.started = true; this.showPoster(false);
    this.clock = p * this.total;
    if (this.clock < this.total) { this.ended = false; this.showEnded(false); }
    this.curFrame = -1; this.paintProgress(); this.syncFrame();
    if (this.playing) this.lastTs = performance.now();
  }
  seek(d) {
    if (this.phase !== 1) return;
    this.started = true; this.showPoster(false);
    this.clock = Math.max(0, Math.min(this.total, this.clock + d));
    if (this.clock < this.total) { this.ended = false; this.showEnded(false); }
    this.curFrame = -1; this.paintProgress(); this.syncFrame();
    if (this.playing) this.lastTs = performance.now();
  }
  onKeyHandler(e) {
    if (e.key === ' ' || e.key === 'k') { e.preventDefault(); this.togglePlay(); }
    else if (e.key === 'ArrowRight') { e.preventDefault(); this.seek(5000); }
    else if (e.key === 'ArrowLeft') { e.preventDefault(); this.seek(-5000); }
    else if (e.key === 'r') { this.replay(); }
  }
  toggleVoice() {
    this.voiceOn = !this.voiceOn;
    if (this.voiceEl) {
      this.voiceEl.setAttribute('aria-pressed', String(this.voiceOn));
      this.voiceEl.style.background = this.voiceOn ? '#e6f4f1' : '#fff';
      this.voiceEl.style.borderColor = this.voiceOn ? '#1b8f8a' : '#e2e7ee';
      this.voiceEl.style.color = this.voiceOn ? '#15706b' : '#12395f';
    }
    if (!this.voiceOn) this.cancelVoice();
    else if (this.playing && this.capEl) this.speak(this.capEl.textContent);
  }
  toggleCC() {
    this.ccOn = !this.ccOn;
    if (this.capWrap) this.capWrap.style.display = this.ccOn ? 'flex' : 'none';
    if (this.ccEl) {
      this.ccEl.setAttribute('aria-pressed', String(this.ccOn));
      this.ccEl.style.background = this.ccOn ? '#e6f4f1' : '#fff';
      this.ccEl.style.borderColor = this.ccOn ? '#1b8f8a' : '#e2e7ee';
      this.ccEl.style.color = this.ccOn ? '#15706b' : '#12395f';
    }
  }

  renderVals() {
    return {
      phases: this.phases,
      lessons: this.lessons,
      frameRef: (el) => { this.frameEl = el; },
      orgRef: (el) => { this.orgEl = el; },
      learnerRef: (el) => { this.learnerEl = el; },
      clockRef: (el) => { this.clockEl = el; },
      numRef: (el) => { this.numEl = el; },
      paneRef: (el) => { this.pane = el; if (el && !this._booted) { this._booted = true; } },
      railRef: (el) => { this.rail = el; },
      onPhase: (e) => this.goPhase(+e.currentTarget.dataset.ph),
      onSelect: (e) => this.setupLesson(+e.currentTarget.dataset.idx, true),
    };
  }
}
</script>
</body>
